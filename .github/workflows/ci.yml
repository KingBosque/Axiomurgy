name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Check contract mirrors match bundled
        run: python scripts/sync_contract_mirrors.py --check

      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Pytest
        run: python -m pytest -q -m "not vermyth_live"

      - name: Smoke (Python)
        run: python scripts/smoke.py

      - name: Smoke (bash)
        if: runner.os != 'Windows'
        run: bash scripts/smoke.sh

  # Optional: enable when a pinned Vermyth HTTP server or image is available in CI.
  vermyth_live:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - name: Live Vermyth integration
        env:
          AXIOMURGY_VERMYTH_LIVE: "1"
          AXIOMURGY_VERMYTH_BASE_URL: ${{ secrets.VERMYTH_HTTP_URL }}
        run: python -m pytest -q tests/integration/test_vermyth_live.py -m vermyth_live

  install_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Check contract mirrors match bundled
        run: python scripts/sync_contract_mirrors.py --check

      - name: Non-editable install and describe from outside repo
        run: |
          python -m venv /tmp/axi_smoke_venv
          /tmp/axi_smoke_venv/bin/pip install -q .
          cd /tmp
          /tmp/axi_smoke_venv/bin/python -m axiomurgy "${{ github.workspace }}/examples/primer_to_axioms.spell.json" --describe | /tmp/axi_smoke_venv/bin/python -c "import json,sys; d=json.load(sys.stdin); assert d.get('mode')=='describe', d"
